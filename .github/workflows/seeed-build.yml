name: Seeed Build

on:
  workflow_dispatch:
    inputs:
      boards:
        description: "Boards (space-separated): recomputer-rk3576-devkit recomputer-rk3588-devkit"
        required: true
        type: string
        default: "recomputer-rk3576-devkit"
      releases:
        description: "Releases (space-separated). Debian: trixie bookworm bullseye buster sid forky resolute. Ubuntu: plucky oracular noble jammy focal questing"
        required: true
        type: string
        default: "trixie"
      tiers:
        description: "Tiers (space-separated): cli minimal mid full. 'cli' = no desktop (build.sh --minimal); others use -d desktop"
        required: true
        type: string
        default: "mid"
      ota_modes:
        description: "OTA modes (space-separated): recovery ab. Each becomes a separate matrix entry (one image per OTA mode). No 'none' — leave empty == no OTA in each entry (build a plain image)."
        required: false
        type: string
        default: ""
      desktop:
        description: "Desktop environment (used only when tier != cli)"
        required: true
        type: choice
        options:
          - gnome
          - xfce
          - kde-plasma
          - mate
          - cinnamon
        default: gnome
      build_mode:
        description: "Build mode (full = kernel+uboot+rootfs+image)"
        required: true
        type: choice
        options:
          - full
          - kernel
          - uboot
          - minimal
        default: full
      extension_ref:
        description: "seeed_armbian_extension ref (branch/tag/commit) on Mkiring fork"
        required: true
        type: string
        default: "main"
      clear_kernel_cache:
        description: "Clear kernel deb/worktree cache before build"
        required: false
        type: boolean
        default: false
      clear_rootfs_cache:
        description: "Clear rootfs cache before build"
        required: false
        type: boolean
        default: false
      publish_release:
        description: "Publish a GitHub Release per board (one release per board, all matrix artifacts grouped)"
        required: false
        type: boolean
        default: false
      release_tag_suffix:
        description: "Release tag suffix (auto: v{YYYYMMDD-HHMM}-{board} if empty)"
        required: false
        type: string
        default: ""

concurrency:
  # Whole matrix is one concurrency group — two dispatches don't overlap.
  group: seeed-build-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  PRIVATE_CCACHE: "yes"
  USE_CCACHE: "yes"
  ENABLE_SEEED_RK_EXTENSION: "yes"
  KERNEL_CONFIGURE: "no"
  VENDOR: "Armbian"
  DOCKER_IMAGE: "ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      boards: ${{ steps.gen.outputs.boards }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - name: Generate matrix JSON from multi-select inputs
        id: gen
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, itertools

          def parse(s):
              return [x for x in (s or "").replace(",", " ").split() if x]

          boards = parse(os.environ["BOARDS"])
          releases = parse(os.environ["RELEASES"])
          tiers = parse(os.environ["TIERS"])
          ota = parse(os.environ["OTA"])

          if not boards:   raise SystemExit("boards is empty")
          if not releases: raise SystemExit("releases is empty")
          if not tiers:    raise SystemExit("tiers is empty")

          # Normalize tier 'cli' -> build.sh --minimal mode (no desktop).
          # If ota list is empty, still emit one entry per (board, release, tier)
          # with profiles="" — that's the "no OTA" plain image.
          if not ota:
              ota = [""]  # single empty profile = plain image, no recovery/ab

          valid_boards = {"recomputer-rk3576-devkit", "recomputer-rk3588-devkit"}
          for b in boards:
              if b not in valid_boards:
                  raise SystemExit(f"unknown board '{b}'; valid: {sorted(valid_boards)}")

          valid_tiers = {"cli", "minimal", "mid", "full"}
          for t in tiers:
              if t not in valid_tiers:
                  raise SystemExit(f"unknown tier '{t}'; valid: {sorted(valid_tiers)}")

          valid_ota = {"", "recovery", "ab"}
          for m in ota:
              if m not in valid_ota:
                  raise SystemExit(f"unknown ota mode '{m}'; valid: recovery, ab (empty=none)")

          entries = []
          for (b, r, t, p) in itertools.product(boards, releases, tiers, ota):
              entries.append({
                  "board": b,
                  "release": r,
                  "tier": t,
                  "profile": p,
                  "is_cli": 1 if t == "cli" else 0,
              })

          print(f"::group::Matrix entries ({len(entries)})")
          for e in entries:
              print(f"  board={e['board']:<28} release={e['release']:<10} tier={e['tier']:<8} profile={e['profile'] or '(none)'}")
          print("::endgroup::")

          # boards list for release job matrix
          boards_unique = list(dict.fromkeys(boards))

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': entries})}\n")
              f.write(f"boards={json.dumps(boards_unique)}\n")
              f.write(f"count={len(entries)}\n")
          PY
        env:
          BOARDS: ${{ inputs.boards }}
          RELEASES: ${{ inputs.releases }}
          TIERS: ${{ inputs.tiers }}
          OTA: ${{ inputs.ota_modes }}

      - name: Print summary
        run: |
          echo "Total matrix entries: ${{ steps.gen.outputs.count }}"
          echo "Boards to release: ${{ steps.gen.outputs.boards }}"

  build:
    needs: plan
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 600
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                     /usr/local/share/boost /usr/local/share/openssl
          sudo apt-get purge -y --auto-remove \
                     'ghc-*' 'dotnet-*' 'llvm-*' 'azure-cli*' \
                     'firefox*' 'google-chrome*' 'powershell*' 'snapd' || true
          sudo apt-get autoremove -y --purge
          sudo apt-get clean
          docker system prune -af --volumes || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Resolve matrix labels
        id: lbl
        run: |
          # Short board name for labels/artifacts (recomputer-rk3576-devkit -> rk3576)
          short=$(echo "${{ matrix.board }}" | sed -E 's/recomputer-//; s/-devkit//')
          ota="${{ matrix.profile }}"
          [ -z "$ota" ] && ota="plain"
          echo "short_board=$short" >> "$GITHUB_OUTPUT"
          echo "ota_label=$ota" >> "$GITHUB_OUTPUT"

      - name: Checkout armbian-build (this fork)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inject extension fork URL into board config
        run: |
          # Only the seeed_armbian_extension URL is rewritten to the Mkiring fork.
          # Kernel (linux-rockchip) is pulled from the official armbian/linux-rockchip
          # repo; changes go through PRs against upstream, not via CI fork swap.
          sed -i 's|https://github.com/Seeed-Studio/seeed_armbian_extension|https://github.com/Mkiring/seeed_armbian_extension|g' \
              config/sources/vendors/seeed-studio/recomputer-rk35xx-common.inc

          echo "=== Verifying substitution ==="
          grep -n "seeed_armbian_extension" config/sources/vendors/seeed-studio/recomputer-rk35xx-common.inc | head -3

      - name: Pre-place seeed_armbian_extension fork
        run: |
          mkdir -p cache/sources
          git clone --depth 1 --branch "${{ inputs.extension_ref }}" \
              https://github.com/Mkiring/seeed_armbian_extension \
              cache/sources/seeed_armbian_extension
          # Symlink so board config's enable_extension picks our pre-placed copy
          mkdir -p extensions
          ln -sf "$PWD/cache/sources/seeed_armbian_extension" extensions/seeed_armbian_extension

      - name: Symlink build.sh into repo root
        run: |
          # build.sh does `cd $SCRIPT_DIR; [[ -f compile.sh ]]`, so it must
          # live in the armbian-build root where compile.sh is.
          ln -sf "$PWD/cache/sources/seeed_armbian_extension/scripts/build.sh" seeed-build.sh
          ls -la seeed-build.sh

      - name: Restore docker image cache
        uses: actions/cache@v4
        id: docker_cache
        with:
          path: /tmp/armbian-docker-image.tar.zst
          key: docker-armbian-ubuntu-noble-latest-v1
        continue-on-error: true

      - name: Load cached docker image
        if: steps.docker_cache.outputs.cache-hit == 'true'
        run: |
          if [ -f /tmp/armbian-docker-image.tar.zst ]; then
            echo "Loading cached docker image..."
            zstd -d -T0 /tmp/armbian-docker-image.tar.zst -o /tmp/armbian-docker-image.tar
            docker load -i /tmp/armbian-docker-image.tar
            rm -f /tmp/armbian-docker-image.tar
            docker images | grep armbian
          fi

      - name: Pull docker image (if not cached)
        if: steps.docker_cache.outputs.cache-hit != 'true'
        run: |
          docker pull ${{ env.DOCKER_IMAGE }}
          # Save for next run. zstd is faster and smaller than gzip for this workload.
          docker save ${{ env.DOCKER_IMAGE }} | zstd -19 -T0 -o /tmp/armbian-docker-image.tar.zst
          ls -lh /tmp/armbian-docker-image.tar.zst

      - name: Restore armbian deb packages cache
        if: ${{ !inputs.clear_kernel_cache }}
        uses: actions/cache@v4
        with:
          path: |
            output/debs
            output/packages-hashed
          key: debs-arm64-${{ matrix.board }}-vendor-${{ hashFiles('config/sources/families/seeed-rk*.conf', 'config/sources/families/rk35xx.conf', 'config/sources/vendors/seeed-studio/*.inc') }}
          restore-keys: |
            debs-arm64-${{ matrix.board }}-vendor-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: cache/ccache
          key: ccache-arm64-${{ matrix.board }}-vendor-${{ github.sha }}
          restore-keys: |
            ccache-arm64-${{ matrix.board }}-vendor-
            ccache-arm64-${{ matrix.board }}-

      - name: Restore rootfs cache
        if: ${{ !inputs.clear_rootfs_cache }}
        uses: actions/cache@v4
        with:
          path: cache/rootfs
          key: rootfs-${{ matrix.release }}-${{ matrix.tier }}-${{ inputs.desktop }}-${{ matrix.profile }}-${{ hashFiles('config/sources/**/*.inc') }}
          restore-keys: |
            rootfs-${{ matrix.release }}-${{ matrix.tier }}-${{ inputs.desktop }}-${{ matrix.profile }}-
            rootfs-${{ matrix.release }}-${{ matrix.tier }}-${{ inputs.desktop }}-
            rootfs-${{ matrix.release }}-

      - name: Build
        run: |
          set -euo pipefail
          MODE_ARGS=""
          case "${{ inputs.build_mode }}" in
            kernel)  MODE_ARGS="--kernel" ;;
            uboot)   MODE_ARGS="--uboot" ;;
            minimal) MODE_ARGS="--minimal" ;;
            full)    MODE_ARGS="" ;;
          esac

          # 'cli' tier -> build.sh --minimal (no desktop, BUILD_MINIMAL=yes)
          TIER_ARGS=""
          if [[ "${{ matrix.tier }}" == "cli" ]]; then
              TIER_ARGS="--minimal"
          else
              TIER_ARGS="-d \"${{ inputs.desktop }}\" -t \"${{ matrix.tier }}\""
          fi

          # Passphrase for encrypted profiles; not a real secret in CI test.
          export CRYPTROOT_PASSPHRASE="${{ secrets.CRYPTROOT_PASSPHRASE || 'armbian-ci-test' }}"

          # shellcheck disable=SC2086
          ./seeed-build.sh \
            $MODE_ARGS \
            ${{ matrix.profile }} \
            -b "${{ matrix.board }}" \
            -R "${{ matrix.release }}" \
            $TIER_ARGS \
            ${{ inputs.clear_kernel_cache && '-c' || '' }} \
            ${{ inputs.clear_rootfs_cache && '-r' || '' }}

      - name: Collect artifacts
        id: collect
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/debs artifacts/images artifacts/logs
          # Stream-compress img via stdout to dodge the chgrp permission error
          # caused by xz trying to clone root ownership from docker-created files.
          # -6 is much faster than -9 with negligible size difference (~5-10%).
          # After compression, regenerate sha256 against the .img.xz itself so
          # users can verify the downloaded artifact without unpacking first.
          shopt -s nullglob
          img_filename=""
          for img in output/images/*.img; do
            base="$(basename "$img" .img).img.xz"
            echo "Compressing $img -> artifacts/images/$base"
            xz -T0 -6 -v < "$img" > "artifacts/images/$base"
            ( cd artifacts/images && sha256sum "$base" > "$base.sha256" )
            img_filename="$base"
          done
          cp output/debs/*.deb artifacts/debs/ 2>/dev/null || true
          cp -r output/config-backups/* artifacts/logs/ 2>/dev/null || \
            cp -r .tmp/*.log artifacts/logs/ 2>/dev/null || true
          echo "img_filename=$img_filename" >> "$GITHUB_OUTPUT"
          # Manifest
          {
            echo "## Build artifacts"
            echo ""
            echo "- Board: ${{ matrix.board }}"
            echo "- Release: ${{ matrix.release }}"
            echo "- Tier: ${{ matrix.tier }}"
            echo "- Desktop: ${{ (matrix.tier == 'cli' && 'none') || format('{0} ({1})', inputs.desktop, matrix.tier) }}"
            echo "- Build mode: ${{ inputs.build_mode }}"
            echo "- Profiles: ${{ matrix.profile || 'none' }}"
            echo "- Extension ref: ${{ inputs.extension_ref }}"
            echo "- Run: ${{ github.run_id }}"
            echo ""
            echo "### Images"
            ! compgen -G "artifacts/images/*.img.xz" > /dev/null 2>&1 || \
              ls -lh artifacts/images/ | tail -n +2
            echo ""
            echo "### Debs"
            ! compgen -G "artifacts/debs/*.deb" > /dev/null 2>&1 || \
              ls -lh artifacts/debs/ | tail -n +2
          } > artifacts/README.md
          cat artifacts/README.md

      - name: Upload images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-img-${{ steps.lbl.outputs.short_board }}-${{ matrix.release }}-${{ matrix.tier }}-${{ steps.lbl.outputs.ota_label }}-${{ github.run_id }}
          path: artifacts/images/*.img.xz
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

      - name: Upload debs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-deb-${{ steps.lbl.outputs.short_board }}-${{ matrix.release }}-${{ matrix.tier }}-${{ steps.lbl.outputs.ota_label }}-${{ github.run_id }}
          path: artifacts/debs/*.deb
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

      - name: Upload manifest and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-manifest-${{ steps.lbl.outputs.short_board }}-${{ matrix.release }}-${{ matrix.tier }}-${{ steps.lbl.outputs.ota_label }}-${{ github.run_id }}
          path: |
            artifacts/README.md
            artifacts/logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Print ccache stats
        if: always()
        run: |
          command -v ccache >/dev/null 2>&1 || { echo "ccache not installed on host; install with: sudo apt-get install -y ccache"; exit 0; }
          ccache -s 2>/dev/null || true
          du -sh cache/ccache 2>/dev/null || true

  release:
    needs: [plan, build]
    if: ${{ always() && inputs.publish_release && !cancelled() }}
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.plan.outputs.boards) }}

    steps:
      - name: Resolve short board name and tag
        id: tag
        run: |
          short=$(echo "${{ matrix.board }}" | sed -E 's/recomputer-//; s/-devkit//')
          echo "short_board=$short" >> "$GITHUB_OUTPUT"
          suffix="${{ inputs.release_tag_suffix }}"
          if [ -n "$suffix" ]; then
            tag="v${suffix}-${short}"
          else
            d=$(date -u +%Y%m%d-%H%M)
            tag="v${d}-${short}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download all image artifacts for this board
        uses: actions/download-artifact@v4
        with:
          pattern: Armbian-img-${{ steps.tag.outputs.short_board }}-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## Armbian images for ${{ matrix.board }}

            Matrix artifacts grouped from CI run ${{ github.run_id }}.
            Each `.img.xz` pairs with a `.sha256` for verification.

            ## Verify

            ```bash
            sha256sum -c *.sha256
            xz -d *.img.xz
            ```
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: false
