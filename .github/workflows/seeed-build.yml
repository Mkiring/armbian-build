name: Seeed Build

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board name"
        required: true
        type: choice
        options:
          - recomputer-rk3576-devkit
          - recomputer-rk3588-devkit
        default: recomputer-rk3576-devkit
      release:
        description: "Release/distro (e.g. trixie, bookworm, noble, jammy)"
        required: true
        type: choice
        options:
          - trixie
          - bookworm
          - bullseye
          - noble
          - jammy
          - focal
        default: trixie
      desktop:
        description: "Desktop environment"
        required: true
        type: choice
        options:
          - gnome
          - xfce
          - kde-plasma
          - mate
          - cinnamon
        default: gnome
      tier:
        description: "Desktop tier"
        required: true
        type: choice
        options:
          - minimal
          - mid
          - full
        default: mid
      build_mode:
        description: "Build mode (full = kernel+uboot+rootfs+image)"
        required: true
        type: choice
        options:
          - full
          - kernel
          - uboot
          - minimal
        default: full
      profiles:
        description: "Feature profiles, space-separated (recovery ab secure-boot optee). Leave empty for plain desktop build."
        required: false
        type: string
        default: ""
      extension_ref:
        description: "seeed_armbian_extension ref (branch/tag/commit) on Mkiring fork"
        required: true
        type: string
        default: "main"
      clear_kernel_cache:
        description: "Clear kernel deb/worktree cache before build"
        required: false
        type: boolean
        default: false
      clear_rootfs_cache:
        description: "Clear rootfs cache before build"
        required: false
        type: boolean
        default: false
      publish_release:
        description: "Publish a GitHub Release with img.xz + debs after build"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release tag (auto: v{date}-{board}-{release} if empty)"
        required: false
        type: string
        default: ""

concurrency:
  group: seeed-build-${{ github.ref }}-${{ inputs.board }}-${{ inputs.release }}
  cancel-in-progress: false

env:
  PRIVATE_CCACHE: "yes"
  USE_CCACHE: "yes"
  ENABLE_SEEED_RK_EXTENSION: "yes"
  KERNEL_CONFIGURE: "no"
  VENDOR: "Armbian"
  DOCKER_IMAGE: "ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest"

jobs:
  build:
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 600

    outputs:
      img_filename: ${{ steps.collect.outputs.img_filename }}
      img_path: ${{ steps.collect.outputs.img_path }}

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                     /usr/local/share/boost /usr/local/share/openssl
          sudo apt-get purge -y --auto-remove \
                     'ghc-*' 'dotnet-*' 'llvm-*' 'azure-cli*' \
                     'firefox*' 'google-chrome*' 'powershell*' 'snapd' || true
          sudo apt-get autoremove -y --purge
          sudo apt-get clean
          docker system prune -af --volumes || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Checkout armbian-build (this fork)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inject extension fork URL into board config
        run: |
          # Only the seeed_armbian_extension URL is rewritten to the Mkiring fork.
          # Kernel (linux-rockchip) is pulled from the official armbian/linux-rockchip
          # repo; changes go through PRs against upstream, not via CI fork swap.
          sed -i 's|https://github.com/Seeed-Studio/seeed_armbian_extension|https://github.com/Mkiring/seeed_armbian_extension|g' \
              config/sources/vendors/seeed-studio/recomputer-rk35xx-common.inc

          echo "=== Verifying substitution ==="
          grep -n "seeed_armbian_extension" config/sources/vendors/seeed-studio/recomputer-rk35xx-common.inc | head -3

      - name: Pre-place seeed_armbian_extension fork
        run: |
          mkdir -p cache/sources
          git clone --depth 1 --branch "${{ inputs.extension_ref }}" \
              https://github.com/Mkiring/seeed_armbian_extension \
              cache/sources/seeed_armbian_extension
          # Symlink so board config's enable_extension picks our pre-placed copy
          mkdir -p extensions
          ln -sf "$PWD/cache/sources/seeed_armbian_extension" extensions/seeed_armbian_extension

      - name: Symlink build.sh into repo root
        run: |
          # build.sh does `cd $SCRIPT_DIR; [[ -f compile.sh ]]`, so it must
          # live in the armbian-build root where compile.sh is.
          ln -sf "$PWD/cache/sources/seeed_armbian_extension/scripts/build.sh" seeed-build.sh
          ls -la seeed-build.sh

      - name: Restore docker image cache
        uses: actions/cache@v4
        id: docker_cache
        with:
          path: /tmp/armbian-docker-image.tar.zst
          key: docker-armbian-ubuntu-noble-latest-v1
        continue-on-error: true

      - name: Load cached docker image
        if: steps.docker_cache.outputs.cache-hit == 'true'
        run: |
          if [ -f /tmp/armbian-docker-image.tar.zst ]; then
            echo "Loading cached docker image..."
            zstd -d -T0 /tmp/armbian-docker-image.tar.zst -o /tmp/armbian-docker-image.tar
            docker load -i /tmp/armbian-docker-image.tar
            rm -f /tmp/armbian-docker-image.tar
            docker images | grep armbian
          fi

      - name: Pull docker image (if not cached)
        if: steps.docker_cache.outputs.cache-hit != 'true'
        run: |
          docker pull ${{ env.DOCKER_IMAGE }}
          # Save for next run. zstd is faster and smaller than gzip for this workload.
          docker save ${{ env.DOCKER_IMAGE }} | zstd -19 -T0 -o /tmp/armbian-docker-image.tar.zst
          ls -lh /tmp/armbian-docker-image.tar.zst

      - name: Restore armbian deb packages cache
        if: ${{ !inputs.clear_kernel_cache }}
        uses: actions/cache@v4
        with:
          path: |
            output/debs
            output/packages-hashed
          key: debs-arm64-${{ inputs.board }}-vendor-${{ hashFiles('config/sources/families/seeed-rk*.conf', 'config/sources/families/rk35xx.conf', 'config/sources/vendors/seeed-studio/*.inc') }}
          restore-keys: |
            debs-arm64-${{ inputs.board }}-vendor-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: cache/ccache
          key: ccache-arm64-${{ inputs.board }}-vendor-${{ github.sha }}
          restore-keys: |
            ccache-arm64-${{ inputs.board }}-vendor-
            ccache-arm64-${{ inputs.board }}-

      - name: Restore kernel/u-boot source worktrees
        if: ${{ !inputs.clear_kernel_cache }}
        uses: actions/cache@v4
        with:
          path: |
            cache/sources/linux-kernel-worktree
            cache/sources/u-boot-worktree
          key: worktree-arm64-${{ inputs.board }}-${{ hashFiles('config/sources/families/seeed-rk*.conf', 'config/sources/families/rk35xx.conf') }}
          restore-keys: |
            worktree-arm64-${{ inputs.board }}-

      - name: Restore rootfs cache
        if: ${{ !inputs.clear_rootfs_cache }}
        uses: actions/cache@v4
        with:
          path: cache/rootfs
          key: rootfs-${{ inputs.release }}-${{ inputs.tier }}-${{ inputs.desktop }}-${{ hashFiles('config/sources/**/*.inc') }}
          restore-keys: |
            rootfs-${{ inputs.release }}-${{ inputs.tier }}-${{ inputs.desktop }}-
            rootfs-${{ inputs.release }}-

      - name: Build
        run: |
          set -euo pipefail
          MODE_ARGS=""
          case "${{ inputs.build_mode }}" in
            kernel)  MODE_ARGS="--kernel" ;;
            uboot)   MODE_ARGS="--uboot" ;;
            minimal) MODE_ARGS="--minimal" ;;
            full)    MODE_ARGS="" ;;
          esac

          # Passphrase for encrypted profiles; not a real secret in CI test.
          export CRYPTROOT_PASSPHRASE="${{ secrets.CRYPTROOT_PASSPHRASE || 'armbian-ci-test' }}"

          # shellcheck disable=SC2086
          ./seeed-build.sh \
            $MODE_ARGS \
            ${{ inputs.profiles }} \
            -b "${{ inputs.board }}" \
            -R "${{ inputs.release }}" \
            -d "${{ inputs.desktop }}" \
            -t "${{ inputs.tier }}" \
            ${{ inputs.clear_kernel_cache && '-c' || '' }} \
            ${{ inputs.clear_rootfs_cache && '-r' || '' }}

      - name: Collect artifacts
        id: collect
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/debs artifacts/images artifacts/logs
          # Stream-compress img via stdout to dodge the chgrp permission error
          # caused by xz trying to clone root ownership from docker-created files.
          # -6 is much faster than -9 with negligible size difference (~5-10%).
          shopt -s nullglob
          img_filename=""
          for img in output/images/*.img; do
            base="$(basename "$img" .img).img.xz"
            echo "Compressing $img -> artifacts/images/$base"
            xz -T0 -6 -v < "$img" > "artifacts/images/$base"
            img_filename="$base"
          done
          # Copy deb packages
          cp output/debs/*.deb artifacts/debs/ 2>/dev/null || true
          # Copy build logs if any
          cp -r output/config-backups/* artifacts/logs/ 2>/dev/null || \
            cp -r .tmp/*.log artifacts/logs/ 2>/dev/null || true
          # Expose filename for the release job
          echo "img_filename=$img_filename" >> "$GITHUB_OUTPUT"
          echo "img_path=artifacts/images/$img_filename" >> "$GITHUB_OUTPUT"
          # Manifest
          {
            echo "## Build artifacts"
            echo ""
            echo "- Board: ${{ inputs.board }}"
            echo "- Release: ${{ inputs.release }}"
            echo "- Desktop: ${{ inputs.desktop }} (${{ inputs.tier }})"
            echo "- Build mode: ${{ inputs.build_mode }}"
            echo "- Profiles: ${{ inputs.profiles || 'none' }}"
            echo "- Extension ref: ${{ inputs.extension_ref }}"
            echo "- Run: ${{ github.run_id }}"
            echo ""
            echo "### Images"
            ! compgen -G "artifacts/images/*.img.xz" > /dev/null 2>&1 || \
              ls -lh artifacts/images/ | tail -n +2
            echo ""
            echo "### Debs"
            ! compgen -G "artifacts/debs/*.deb" > /dev/null 2>&1 || \
              ls -lh artifacts/debs/ | tail -n +2
          } > artifacts/README.md
          cat artifacts/README.md

      - name: Upload images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-img-${{ inputs.board }}-${{ inputs.release }}-${{ github.run_id }}
          path: artifacts/images/*.img.xz
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

      - name: Upload debs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-deb-${{ inputs.board }}-${{ inputs.release }}-${{ github.run_id }}
          path: artifacts/debs/*.deb
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

      - name: Upload manifest and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-manifest-${{ inputs.board }}-${{ inputs.release }}-${{ github.run_id }}
          path: |
            artifacts/README.md
            artifacts/logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Print ccache stats
        if: always()
        run: |
          command -v ccache >/dev/null 2>&1 || { echo "ccache not installed on host; install with: sudo apt-get install -y ccache"; exit 0; }
          ccache -s 2>/dev/null || true
          du -sh cache/ccache 2>/dev/null || true

  release:
    needs: build
    if: ${{ always() && inputs.publish_release && needs.build.result == 'success' }}
    runs-on: ubuntu-26.04-arm
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          else
            d=$(date -u +%Y%m%d)
            tag="v${d}-${{ inputs.board }}-${{ inputs.release }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: Armbian-img-${{ inputs.board }}-${{ inputs.release }}-${{ github.run_id }}
          path: release-assets

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: Armbian-deb-${{ inputs.board }}-${{ inputs.release }}-${{ github.run_id }}
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## Armbian image for ${{ inputs.board }}

            - Board: ${{ inputs.board }}
            - Release: ${{ inputs.release }}
            - Desktop: ${{ inputs.desktop }} (${{ inputs.tier }})
            - Build mode: ${{ inputs.build_mode }}
            - Profiles: ${{ inputs.profiles || 'none' }}
            - Extension ref: ${{ inputs.extension_ref }}

            Built from CI run ${{ github.run_id }}.
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: false
