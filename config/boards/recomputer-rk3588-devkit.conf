# Seeed Studio Rockchip RK3588 octa core 4/8/16GB RAM eMMC NVMe 2.5GbE USB3 HDMI DP WiFi BT
BOARD_NAME="reComputer RK3588 Devkit"
BOARDFAMILY="seeed-rk3588"
BOARD_MAINTAINER="Pillar1989"
BOARD_VENDOR="seeed-studio"
INTRODUCED="2025"
BOOTCONFIG="recomputer-rk3588-devkit_defconfig" # vendor name, not standard, see hook below, set BOOT_SOC below to compensate
BOOT_SOC="rk3588"
KERNEL_TARGET="vendor"
KERNEL_TEST_TARGET="vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3588-recomputer-rk3588-devkit.dtb"
BOOT_SCENARIO="spl-blobs"
BOOT_SUPPORT_SPI="yes"
BOOT_SPI_RKSPI_LOADER="yes"
IMAGE_PARTITION_TABLE="gpt"
OTA_ENABLE="yes"
SERIALCON="ttyFIQ0,ttyGS0"
BT_UART="/dev/ttyS6"
PACKAGE_LIST_BOARD="net-tools rfkill pulseaudio-module-bluetooth fail2ban"
AIC8800_TYPE="sdio"
RECOMPUTER_GPU_STACK="panthor"
enable_extension "radxa-aic8800"

source "${SRC}/config/sources/vendors/seeed-studio/recomputer-rk35xx-common.inc"

# Load the Panthor GPU DT overlay at boot. The kernel has CONFIG_DRM_PANTHOR=y
# and the vendor Mali kbase configs disabled, so without this overlay the
# GPU node is never probed and Mesa falls back to llvmpipe.
# Guarded on RECOMPUTER_GPU_STACK so a future mali-stack flip won't leave a
# stale panthor overlay in armbianEnv.txt that fails to apply on boot.
if [[ "${RECOMPUTER_GPU_STACK}" == "panthor" ]]; then
	DEFAULT_OVERLAYS="rockchip-rk3588-panthor-gpu"
fi

function post_family_config__recomputer_rk3588_devkit_use_seeed_bootscript() {
	display_alert "$BOARD" "Using Seeed bootscript: boot-seeed-rk35xx.cmd -> boot.cmd" "info"
	declare -g BOOTSCRIPT="boot-seeed-rk35xx.cmd:boot.cmd"
}

# Install libmali package for RK3588 GPU userspace
function pre_install_distribution_specific__recomputer_rk3588_install_libmali() {
	if [[ "${RECOMPUTER_GPU_STACK}" == "panthor" ]]; then
		display_alert "Skipping Mali GPU libraries" "Using Panthor/Mesa userspace" "info"
		return 0
	fi

	display_alert "Installing Mali GPU libraries from APT repo" "libmali-g610" "info"

	seeed_recomputer_install_from_apt libmali-valhall-g610-g24p0-x11-wayland-gbm
	chroot_sdcard ldconfig
}

function post_family_tweaks__recomputer_rk3588_install_panthor_mesa() {
	[[ "${RECOMPUTER_GPU_STACK}" == "panthor" ]] || return 0

	# Stock Mesa in bookworm (22.x) is too old for Panthor (needs >= 24).
	# bookworm pulls Mesa from backports; other releases (Ubuntu, trixie, etc.)
	# already ship Mesa >= 24 in stock repos and need no special source.
	local mesa_pkgs="libgbm1 libegl-mesa0 libgl1-mesa-dri libglx-mesa0 mesa-vulkan-drivers mesa-utils vulkan-tools"

	if [[ "${RELEASE}" == "bookworm" ]]; then
		display_alert "Panthor Mesa userspace" "Installing Mesa from bookworm-backports" "info"

		cat > "${SDCARD}/etc/apt/sources.list.d/bookworm-backports.list" <<-'EOF'
		deb http://deb.debian.org/debian bookworm-backports main contrib non-free non-free-firmware
		EOF

		do_with_retries 3 chroot_sdcard_apt_get_update
		do_with_retries 3 chroot_sdcard_apt_get --no-install-recommends install -t bookworm-backports $mesa_pkgs
	else
		display_alert "Panthor Mesa userspace" "Installing Mesa from ${RELEASE} stock repos" "info"

		do_with_retries 3 chroot_sdcard_apt_get_update
		do_with_retries 3 chroot_sdcard_apt_get --no-install-recommends install $mesa_pkgs
	fi
}

function pre_update_initramfs__recomputer_rk3588_install_panthor_firmware() {
	[[ "${RECOMPUTER_GPU_STACK}" == "panthor" ]] || return 0

	local root_dir="${MOUNT:-${SDCARD}}"
	local fw_src=""
	local -a fw_candidates=(
		"${SRC}/cache/sources/${LINUXSOURCEDIR:-}/drivers/gpu/arm/bifrost/mali_csffw.bin"
		"${SRC}/../linux-rockchip/drivers/gpu/arm/bifrost/mali_csffw.bin"
	)
	fw_candidates+=("${SRC}"/cache/sources/linux-kernel-worktree/*/drivers/gpu/arm/bifrost/mali_csffw.bin)

	for candidate in "${fw_candidates[@]}"; do
		if [[ -f "${candidate}" ]]; then
			fw_src="${candidate}"
			break
		fi
	done

	[[ -n "${fw_src}" ]] || exit_with_error "Panthor firmware not found" "mali_csffw.bin"

	display_alert "Panthor firmware" "Installing ${fw_src}" "info"
	install -Dm0644 "${fw_src}" "${root_dir}/lib/firmware/arm/mali/arch10.8/mali_csffw.bin"

	mkdir -p "${root_dir}/etc/initramfs-tools/hooks"
	cat > "${root_dir}/etc/initramfs-tools/hooks/panthor-firmware" <<-'EOF'
	#!/bin/sh
	set -e
	. /usr/share/initramfs-tools/hook-functions

	mkdir -p "${DESTDIR}/lib/firmware/arm/mali/arch10.8"
	cp -p /lib/firmware/arm/mali/arch10.8/mali_csffw.bin \
		"${DESTDIR}/lib/firmware/arm/mali/arch10.8/"
	EOF
	chmod +x "${root_dir}/etc/initramfs-tools/hooks/panthor-firmware"
}

# When booting without a monitor, dw-hdmi_qp reports all HDMI connectors as
# disconnected → mutter 43.8 cannot create a swapchain → gnome-shell exits
# silently within 1s → GDM falls back to X11. Plugging a monitor later does
# NOT switch GDM back to Wayland, because GDM only makes the Wayland/X choice
# once at startup.
#
# Solution (udev → systemd oneshot → retry-with-verify):
# - udev rule on card0 change starts a systemd oneshot service (--no-block,
#   so udev worker returns immediately)
# - Service runs script that:
#   1) no-op if already on Wayland (pgrep Xorg fails)
#   2) waits for EDID on any HDMI connector (vendor driver takes ~15s)
#   3) waits for dpms=On — X's mode set completes, the real "PHY/VOP ready"
#      signal, not a fixed sleep
#   4) retries systemctl restart gdm3 up to 3 times, verifying each time
#      whether Xorg is gone (= mutter succeeded)
# - systemd dedupes concurrent triggers; the service has its own lifecycle,
#   visible via `systemctl status gdm-hotplug-wayland`.
function post_family_tweaks__recomputer_rk3588_gdm_hotplug_wayland() {
	[[ "${RECOMPUTER_GPU_STACK}" == "panthor" ]] || return 0

	display_alert "$BOARD" "Installing GDM hotplug→Wayland auto-switch (systemd-based)" "info"

	install -m 0755 -d "${SDCARD}/usr/local/bin" "${SDCARD}/etc/systemd/system" "${SDCARD}/etc/udev/rules.d"

	cat > "${SDCARD}/usr/local/bin/gdm-hotplug-wayland.sh" <<'EOF'
#!/bin/sh
# Triggered by systemd service gdm-hotplug-wayland.service on DRM hotplug.
# Goal: if we're stuck on X11 fallback, retry starting gdm3 until mutter
# successfully starts Wayland. Verifies actual outcome, not just timing.
#
# Why: vendor dw-hdmi_qp driver takes ~15s after HPD to bring up PHY/VOP.
# mutter 43.8 dies within 1s if atomic modesetting can't complete on a
# not-yet-ready pipeline. Retry-with-verification handles the timing
# uncertainty without fixed sleeps.

set -u
logger -t gdm-hotplug "service triggered"

# Guard: only act when Xorg is running (= we're on X11 fallback)
if pgrep Xorg >/dev/null 2>&1; then
	logger -t gdm-hotplug "Xorg running, eligible"
else
	logger -t gdm-hotplug "no Xorg, no-op (already Wayland)"
	exit 0
fi

# Wait for EDID on at least one HDMI connector (up to 30s)
# Use wc -c, not [ -s ]: sysfs files always report size 0 via stat()
edid_ok=0
i=0
while [ "$i" -lt 60 ]; do
	for e in /sys/class/drm/card0-HDMI-A-*/edid; do
		sz=$(wc -c < "$e" 2>/dev/null || echo 0)
		if [ "$sz" -gt 0 ]; then
			logger -t gdm-hotplug "EDID ready at $e (${sz}B) after $((i/2))s"
			edid_ok=1
			break 2
		fi
	done
	sleep 0.5
	i=$((i+1))
done
if [ "$edid_ok" -ne 1 ]; then
	logger -t gdm-hotplug "no EDID after 30s, give up"
	exit 0
fi

# Wait for Xorg to bring up the display pipeline (dpms goes On) on a
# CONNECTED connector. Disconnected ports may report dpms=On by default
# (driver quirk), so we must filter by status=connected.
i=0
while [ "$i" -lt 30 ]; do
	for c in /sys/class/drm/card0-HDMI-A-*/; do
		[ "$(cat "${c}status" 2>/dev/null)" = "connected" ] || continue
		if [ "$(cat "${c}dpms" 2>/dev/null)" = "On" ]; then
			logger -t gdm-hotplug "dpms On at ${c}dpms after ${i}s (connected)"
			break 2
		fi
	done
	sleep 1
	i=$((i+1))
done

# Retry loop: restart gdm, verify mutter actually started (Xorg gone).
for attempt in 1 2 3; do
	logger -t gdm-hotplug "attempt $attempt: systemctl restart gdm3"
	systemctl restart gdm3
	# Give mutter 8s to start (it usually dies within 1s if it's going to)
	sleep 8
	if ! pgrep Xorg >/dev/null 2>&1; then
		logger -t gdm-hotplug "attempt $attempt: Xorg gone, Wayland up"
		exit 0
	fi
	logger -t gdm-hotplug "attempt $attempt: Xorg still running, will retry"
done

logger -t gdm-hotplug "all attempts failed, give up"
exit 0
EOF
	chmod 0755 "${SDCARD}/usr/local/bin/gdm-hotplug-wayland.sh"

	cat > "${SDCARD}/etc/systemd/system/gdm-hotplug-wayland.service" <<'EOF'
[Unit]
Description=Retry GDM/Wayland startup on HDMI hotplug
Documentation=file:/usr/local/bin/gdm-hotplug-wayland.sh
After=gdm.service
Requisite=gdm.service
ConditionPathExists=/sys/class/drm/card0-HDMI-A-1/status

[Service]
Type=oneshot
ExecStart=/usr/local/bin/gdm-hotplug-wayland.sh
RemainAfterExit=no
EOF
	chmod 0644 "${SDCARD}/etc/systemd/system/gdm-hotplug-wayland.service"

	# Note: vendor rk3588 BSP kernel sends the change event on the drm_minor
	# (card0) device, not on the drm_connector like mainline. Match
	# KERNEL=="card0" accordingly. Use `systemctl start --no-block` so the
	# udev worker returns immediately; systemd manages the service lifecycle.
	cat > "${SDCARD}/etc/udev/rules.d/99-gdm-hotplug-wayland.rules" <<'EOF'
# HDMI/DP hotplug: trigger gdm-hotplug-wayland.service to retry Wayland startup.
# Vendor rk3588 BSP sends the change event on the drm_minor (card0) device,
# not on the drm_connector like mainline. Match KERNEL=="card0" accordingly.
SUBSYSTEM=="drm", ACTION=="change", KERNEL=="card0", \
  RUN+="/bin/systemctl start --no-block gdm-hotplug-wayland.service"
EOF
	chmod 0644 "${SDCARD}/etc/udev/rules.d/99-gdm-hotplug-wayland.rules"
}

# Install RK camera engine package for RK3588
function pre_install_distribution_specific__recomputer_rk3588_install_camera_engine() {
	display_alert "Installing camera engine from APT repo" "camera-engine-rkaiq" "info"

	seeed_recomputer_install_from_apt camera-engine-rkaiq-rk3588

	display_alert "Camera engine installed successfully" "camera-engine-rkaiq" "info"
}

# Audio naming: HDMI0, HDMI1, HDMI-In, DP0, ES8311
function post_family_tweaks__recomputer_rk3588_naming_audios() {
	display_alert "$BOARD" "Renaming recomputer rk3588 devkit audios" "info"

	mkdir -p "${SDCARD}"/etc/udev/rules.d/
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmi0-sound", ENV{SOUND_DESCRIPTION}="HDMI0 Audio"' > "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmi1-sound", ENV{SOUND_DESCRIPTION}="HDMI1 Audio"' >> "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmiin-sound", ENV{SOUND_DESCRIPTION}="HDMI-In Audio"' >> "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-dp0-sound", ENV{SOUND_DESCRIPTION}="DP0 Audio"' >> "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-es8311-sound", ENV{SOUND_DESCRIPTION}="ES8311 Audio"' >> "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
}
